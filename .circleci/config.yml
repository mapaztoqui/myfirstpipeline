version: 2.1

jobs:
  build:
    docker:
      - image: cimg/python:3.11
    working_directory: ~/repo
    steps:
      # Step 1: Obtener código de GitHub
      - checkout

      # Step 2: Crear venv e instalar dependencias
      - run:
          name: Install dependencies
          command: |
            python -m venv venv
            . venv/bin/activate
            python -m pip install --upgrade pip
            pip install -r requirements.txt flake8

      # Step 3: Ejecutar flake8 y pytest
      - run:
          name: Run tests
          command: |
            . venv/bin/activate
            flake8 --exclude=venv* --statistics
            pytest -v

workflows:
  build_and_test:
    jobs:
      - build



